#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "code-server"
name = "code-server"
description.en = "Run VS Code on your server and access it in the browser"
description.fr = "Lancez VS Code sur votre serveur et accédez-y depuis votre navigateur"

version = "4.122.1~ynh1"

maintainers = ["Tagada"]

[upstream]
license = "MIT"
website = "https://coder.com"
admindoc = "https://coder.com/docs/code-server/latest"
userdoc = "https://coder.com/docs/code-server/latest/FAQ"
code = "https://github.com/coder/code-server"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "500M"
ram.build = "50M"
ram.runtime = "100M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/code"

    [install.admin]
    type = "user"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/coder/code-server/releases/download/v4.122.1/code-server-4.122.1-linux-amd64.tar.gz"
    amd64.sha256 = "fa140f256505c59b1efcf7b3f29cb90bbc218a997578851d1e9d5739ece80bce"
    arm64.url = "https://github.com/coder/code-server/releases/download/v4.122.1/code-server-4.122.1-linux-arm64.tar.gz"
    arm64.sha256 = "81e66ebd15244e3ee1cb548128aa875a12835ad0bccda002fd87b511a9578ea2"
    armhf.url = "https://github.com/coder/code-server/releases/download/v4.122.1/code-server-4.122.1-linux-armv7l.tar.gz"
    armhf.sha256 = "2042228039064a5a5c31559a7484ab3873d0d7a053126ddb643d8c4c901c8ad3"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.arm64 = "code-server-.*-linux-arm64.tar.gz"
    autoupdate.asset.amd64 = "code-server-.*-linux-amd64.tar.gz"
    autoupdate.asset.armhf = "code-server-.*-linux-armv7l.tar.gz"

    [resources.system_user]

    [resources.install_dir]
    dir = "/opt/yunohost/__APP__"

    [resources.data_dir]
    subdirs = ["user-data", "extensions"]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "argon2"
