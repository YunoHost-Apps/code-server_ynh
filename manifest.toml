#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "code-server"
name = "code-server"
description.en = "Run VS Code on your server and access it in the browser"
description.fr = "Lancez VS Code sur votre serveur et accédez-y depuis votre navigateur"

version = "4.109.5~ynh1"

maintainers = ["Tagada"]

[upstream]
license = "MIT"
website = "https://coder.com"
admindoc = "https://coder.com/docs/code-server/latest"
userdoc = "https://coder.com/docs/code-server/latest/FAQ"
code = "https://github.com/coder/code-server"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "500M"
ram.build = "50M"
ram.runtime = "100M"

[install]
    [install.domain]
    type = "domain"

    [install.admin]
    type = "user"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/coder/code-server/releases/download/v4.109.5/code-server-4.109.5-linux-amd64.tar.gz"
    amd64.sha256 = "15ca7472e4522f214e01143673559938536571d7152c5fca3cb42966e79a688b"
    arm64.url = "https://github.com/coder/code-server/releases/download/v4.109.5/code-server-4.109.5-linux-arm64.tar.gz"
    arm64.sha256 = "56af7eb5d85135482844798c607cca6be315f27a41e3b4ed83152442c7646bdc"
    armhf.url = "https://github.com/coder/code-server/releases/download/v4.109.5/code-server-4.109.5-linux-armv7l.tar.gz"
    armhf.sha256 = "8dc7425442b5766fa496d74b253df26aac2cf2fea336d4e630e4cd9e54f43c19"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.arm64 = "code-server-.*-linux-arm64.tar.gz"
    autoupdate.asset.amd64 = "code-server-.*-linux-amd64.tar.gz"
    autoupdate.asset.armhf = "code-server-.*-linux-armv7l.tar.gz"

    [resources.system_user]

    [resources.install_dir]
    dir = "/opt/yunohost/__APP__"

    [resources.data_dir]
    subdirs = ["user-data", "extensions"]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "argon2"
