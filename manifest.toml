#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "code-server"
name = "code-server"
description.en = "Run VS Code on your server and access it in the browser"
description.fr = "Lancez VS Code sur votre serveur et accédez-y depuis votre navigateur"

version = "4.113.1~ynh1"

maintainers = ["Tagada"]

[upstream]
license = "MIT"
website = "https://coder.com"
admindoc = "https://coder.com/docs/code-server/latest"
userdoc = "https://coder.com/docs/code-server/latest/FAQ"
code = "https://github.com/coder/code-server"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "500M"
ram.build = "50M"
ram.runtime = "100M"

[install]
    [install.domain]
    type = "domain"

    [install.admin]
    type = "user"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/coder/code-server/releases/download/v4.113.1/code-server-4.113.1-linux-amd64.tar.gz"
    amd64.sha256 = "f8325654035ee3ea03b026be0304eaa2f9f35d0a1703d4c12698bd7a152d429f"
    arm64.url = "https://github.com/coder/code-server/releases/download/v4.113.1/code-server-4.113.1-linux-arm64.tar.gz"
    arm64.sha256 = "959ee1898d03c71a7ae888edfb63f090227033924b1ba108465103df4bc47fdc"
    armhf.url = "https://github.com/coder/code-server/releases/download/v4.113.1/code-server-4.113.1-linux-armv7l.tar.gz"
    armhf.sha256 = "4f796a3b48e5bba42adb92401c8745b9b76693864f6dd3aaffce7ce7db4d29ea"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.arm64 = "code-server-.*-linux-arm64.tar.gz"
    autoupdate.asset.amd64 = "code-server-.*-linux-amd64.tar.gz"
    autoupdate.asset.armhf = "code-server-.*-linux-armv7l.tar.gz"

    [resources.system_user]

    [resources.install_dir]
    dir = "/opt/yunohost/__APP__"

    [resources.data_dir]
    subdirs = ["user-data", "extensions"]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "argon2"
