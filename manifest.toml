#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "code-server"
name = "code-server"
description.en = "Run VS Code on your server and access it in the browser"
description.fr = "Lancez VS Code sur votre serveur et accédez-y depuis votre navigateur"

version = "4.115.0~ynh1"

maintainers = ["Tagada"]

[upstream]
license = "MIT"
website = "https://coder.com"
admindoc = "https://coder.com/docs/code-server/latest"
userdoc = "https://coder.com/docs/code-server/latest/FAQ"
code = "https://github.com/coder/code-server"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "500M"
ram.build = "50M"
ram.runtime = "100M"

[install]
    [install.domain]
    type = "domain"

    [install.admin]
    type = "user"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/coder/code-server/releases/download/v4.115.0/code-server-4.115.0-linux-amd64.tar.gz"
    amd64.sha256 = "2d43f4023fe425ecf41806e57cbbc64ce7d3be50cfd76690dc45f52375a836ed"
    arm64.url = "https://github.com/coder/code-server/releases/download/v4.115.0/code-server-4.115.0-linux-arm64.tar.gz"
    arm64.sha256 = "8848f99c25172fe9128ef77ac1937387be932bc20d0eab7d067e9018684d4074"
    armhf.url = "https://github.com/coder/code-server/releases/download/v4.115.0/code-server-4.115.0-linux-armv7l.tar.gz"
    armhf.sha256 = "206901d27f1ffee5ad5b8ed58fb324f907ef1bef2369188f8e84ac184f45592f"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.arm64 = "code-server-.*-linux-arm64.tar.gz"
    autoupdate.asset.amd64 = "code-server-.*-linux-amd64.tar.gz"
    autoupdate.asset.armhf = "code-server-.*-linux-armv7l.tar.gz"

    [resources.system_user]

    [resources.install_dir]
    dir = "/opt/yunohost/__APP__"

    [resources.data_dir]
    subdirs = ["user-data", "extensions"]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "argon2"
