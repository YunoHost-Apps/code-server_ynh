#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "code-server"
name = "code-server"
description.en = "Run VS Code on your server and access it in the browser"
description.fr = "Lancez VS Code sur votre serveur et accédez-y depuis votre navigateur"

version = "4.113.0~ynh1"

maintainers = ["Tagada"]

[upstream]
license = "MIT"
website = "https://coder.com"
admindoc = "https://coder.com/docs/code-server/latest"
userdoc = "https://coder.com/docs/code-server/latest/FAQ"
code = "https://github.com/coder/code-server"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "500M"
ram.build = "50M"
ram.runtime = "100M"

[install]
    [install.domain]
    type = "domain"

    [install.admin]
    type = "user"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/coder/code-server/releases/download/v4.113.0/code-server-4.113.0-linux-amd64.tar.gz"
    amd64.sha256 = "63a7955f40fbb1902bd9fa162ee32847dc0c67919ace16d14fbd5af340cd7267"
    arm64.url = "https://github.com/coder/code-server/releases/download/v4.113.0/code-server-4.113.0-linux-arm64.tar.gz"
    arm64.sha256 = "e069eb95b30c4f27cac080962f757e69dc309740d8e412441bb9740cc0238ceb"
    armhf.url = "https://github.com/coder/code-server/releases/download/v4.113.0/code-server-4.113.0-linux-armv7l.tar.gz"
    armhf.sha256 = "3af918139d3d114b1699489f36b86ed5d3a40194be15389754699df0770021d5"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.arm64 = "code-server-.*-linux-arm64.tar.gz"
    autoupdate.asset.amd64 = "code-server-.*-linux-amd64.tar.gz"
    autoupdate.asset.armhf = "code-server-.*-linux-armv7l.tar.gz"

    [resources.system_user]

    [resources.install_dir]
    dir = "/opt/yunohost/__APP__"

    [resources.data_dir]
    subdirs = ["user-data", "extensions"]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "argon2"
