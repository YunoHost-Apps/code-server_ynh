#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "code-server"
name = "code-server"
description.en = "Run VS Code on your server and access it in the browser"
description.fr = "Lancez VS Code sur votre serveur et accédez-y depuis votre navigateur"

version = "4.114.1~ynh1"

maintainers = ["Tagada"]

[upstream]
license = "MIT"
website = "https://coder.com"
admindoc = "https://coder.com/docs/code-server/latest"
userdoc = "https://coder.com/docs/code-server/latest/FAQ"
code = "https://github.com/coder/code-server"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "500M"
ram.build = "50M"
ram.runtime = "100M"

[install]
    [install.domain]
    type = "domain"

    [install.admin]
    type = "user"

[resources]
    [resources.sources.main]
    amd64.url = "https://github.com/coder/code-server/releases/download/v4.114.1/code-server-4.114.1-linux-amd64.tar.gz"
    amd64.sha256 = "21145c7a89354ddd14bf8d493996cd2f81ef93431a9590f9beed56b62325a1f6"
    arm64.url = "https://github.com/coder/code-server/releases/download/v4.114.1/code-server-4.114.1-linux-arm64.tar.gz"
    arm64.sha256 = "495eb156169af499fe8698c066eff0c6413096fecf95d8f9c77820e5ece51320"
    armhf.url = "https://github.com/coder/code-server/releases/download/v4.114.1/code-server-4.114.1-linux-armv7l.tar.gz"
    armhf.sha256 = "87060cc4939da49fa2bc533f4e2cfa8d5b1a02c8b3f7c81af07212d5c4ed9927"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.arm64 = "code-server-.*-linux-arm64.tar.gz"
    autoupdate.asset.amd64 = "code-server-.*-linux-amd64.tar.gz"
    autoupdate.asset.armhf = "code-server-.*-linux-armv7l.tar.gz"

    [resources.system_user]

    [resources.install_dir]
    dir = "/opt/yunohost/__APP__"

    [resources.data_dir]
    subdirs = ["user-data", "extensions"]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "argon2"
